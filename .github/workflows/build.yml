name: Build CoinGate Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up ESP-IDF
      uses: espressif/idf-action@v1
      with:
        idf-version: v4.4.4
        target: esp32
    
    - name: Build firmware
      run: |
        idf.py build
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: coingate-firmware
        path: build/bootloader/bootloader.bin
        retention-days: 5
    
    - name: Upload partition table
      uses: actions/upload-artifact@v4
      with:
        name: coingate-partitions
        path: build/partition_table/partition-table.bin
        retention-days: 5
    
    - name: Upload app binary
      uses: actions/upload-artifact@v4
      with:
        name: coingate-app
        path: build/coingate.bin
        retention-days: 5
