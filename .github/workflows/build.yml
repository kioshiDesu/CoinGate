name: Build CoinGate Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Checkout ESP-IDF
      uses: actions/checkout@v4
      with:
        repository: espressif/esp-idf
        ref: v4.4.4
        path: esp-idf
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Python dependencies
      run: |
        pip install pyyaml
        
    - name: Build firmware
      env:
        IDF_PATH: ${{ github.workspace }}/esp-idf
      run: |
        . $IDF_PATH/export.sh
        idf.py set-target esp32
        idf.py build
    
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: coingate-firmware
        path: build/bootloader/bootloader.bin
        retention-days: 5
    
    - name: Upload partition table
      uses: actions/upload-artifact@v4
      with:
        name: coingate-partitions
        path: build/partition_table/partition-table.bin
        retention-days: 5
    
    - name: Upload app binary
      uses: actions/upload-artifact@v4
      with:
        name: coingate-app
        path: build/coingate.bin
        retention-days: 5
