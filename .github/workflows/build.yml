name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v4.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build

      - name: List build artifacts
        run: find build -name "*.bin" -type f

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coingate-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: coingate-firmware
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: coingate-latest
          name: CoinGate Firmware (Latest Build)
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite: true
          files: |
            artifacts/bootloader.bin
            artifacts/partition-table.bin
            artifacts/coingate.bin
